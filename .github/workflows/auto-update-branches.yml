name: Auto-update PR branches

on:
  workflow_call:
    secrets:
      CLAUDE_ARAMI_APP_ID:
        required: true
      CLAUDE_ARAMI_PRIVATE_KEY:
        required: true

permissions:
  pull-requests: write
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Update open PR branches
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number -q '.[].number')
          for pr in $prs; do
            echo "Updating PR #$pr..."
            gh api \
              --method PUT \
              "repos/$GITHUB_REPOSITORY/pulls/$pr/update-branch" \
              -f update_method="rebase" \
              2>&1 || echo "  Skipped (already up to date or conflict)"
          done
